name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy the verified build to the production Worker
        required: true
        type: boolean
        default: false

permissions:
  contents: read

env:
  # Pinned for deterministic build-time KaTeX output. Do not upgrade casually.
  HUGO_VERSION: "0.164.0"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Hugo extended (pinned)
        run: |
          curl -sSL -o /tmp/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          sudo tar -xzf /tmp/hugo.tar.gz -C /usr/local/bin hugo
          hugo version

      - uses: actions/cache@v5
        with:
          path: .hugo_cache
          key: hugo-${{ runner.os }}-${{ env.HUGO_VERSION }}-${{ hashFiles('content/**', 'layouts/**', 'assets/**') }}
          restore-keys: |
            hugo-${{ runner.os }}-${{ env.HUGO_VERSION }}-

      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run check:build

  deploy:
    name: Deploy production
    needs: verify
    if: github.event_name == 'push' || inputs.deploy == true
    runs-on: ubuntu-latest
    concurrency:
      group: cloudflare-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Hugo extended (pinned)
        run: |
          curl -sSL -o /tmp/hugo.tar.gz \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          sudo tar -xzf /tmp/hugo.tar.gz -C /usr/local/bin hugo

      - run: npm ci
      - run: npm run build

      - name: Deploy static assets to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.112.0"
          command: deploy
